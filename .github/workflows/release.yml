name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish Packages
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Verify required secrets
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          : "${PAT_TOKEN:?PAT_TOKEN secret is not set — add it to the 'main' environment (Settings → Environments)}"
          : "${NPM_TOKEN:?NPM_TOKEN secret is not set — add it to the 'main' environment (Settings → Environments)}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Exit pre-release mode
        run: |
          if grep -q '"mode": *"pre"' .changeset/pre.json 2>/dev/null; then
            npx changeset pre exit
            # `changeset pre exit` only flips mode to "exit"; it leaves the file
            # behind. Remove it so it doesn't linger and skew `changeset status`.
            git rm -f .changeset/pre.json
            git commit -m "chore: exit pre-release mode [skip ci]"
          fi

      - name: Version packages
        run: npx changeset version

      - name: Push version bumps
        run: git push

      - name: Re-install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish packages
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release tags
        run: git push --follow-tags

      - name: Create GitHub release
        # The release/{version} PR adds docs/releases/{version}.md to main, so the
        # notes file is present here. Fall back to auto-generated notes if it is
        # missing, and skip cleanly if the release already exists.
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/rxfy/package.json').version")
          TAG="rxfy@${VERSION}"
          NOTES="docs/releases/${VERSION}.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi
          if [ -f "$NOTES" ]; then
            gh release create "$TAG" --title "$VERSION" --notes-file "$NOTES"
          else
            echo "::warning::$NOTES not found, generating notes automatically."
            gh release create "$TAG" --title "$VERSION" --generate-notes
          fi

      - name: Sync version bumps to staging and develop
        continue-on-error: true
        # Force a merge commit (--no-ff) carrying [skip ci] so the push to
        # staging does NOT re-trigger the RC Release workflow. GitHub evaluates
        # the skip marker on the head commit of the push; a fast-forward would
        # leave main's tip ("chore: trigger release") as head and fire RC.
        run: |
          for branch in staging develop; do
            git fetch origin $branch
            git checkout $branch
            git merge main --no-ff --no-edit -X theirs \
              -m "chore: sync release from main to $branch [skip ci]"
            git push origin $branch
          done
