name: Deploy Docs (Railway)

# Rebuilds the docs service on Railway from source. Two triggers:
#
#   1. push to main        — every merge to main ships the latest docs.
#   2. release: published  — the docs changelog (/changelog) is baked at
#      `vocs build` time by fetching GitHub Releases. The Release workflow creates
#      the GitHub Release as its LAST step, after every push that already built the
#      docs — so a release-time build never sees the new release and the changelog
#      lags one version behind. Rebuilding once the release exists closes that gap.
#
# `serviceInstanceDeployV2` rebuilds from the repo (unlike `serviceInstanceRedeploy`,
# which reuses the cached build), so `vocs build` re-runs and re-fetches releases.
#
# This makes CI the single source of truth for docs deploys — DISABLE Railway's own
# "deploy on push" for the docs service so a main push doesn't build twice.
#
# Required repo config (Settings → Secrets and variables → Actions):
#   secrets.RAILWAY_TOKEN              — a Railway account/team token (not a project token)
#   vars.RAILWAY_DOCS_SERVICE_ID       — the docs service id
#   vars.RAILWAY_DOCS_ENVIRONMENT_ID   — the production environment id

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  # Collapse overlapping triggers (e.g. the main push and the release that follows
  # it) so only the newest rebuild request wins.
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Rebuild docs on Railway
    runs-on: ubuntu-latest
    steps:
      - name: Verify config
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ vars.RAILWAY_DOCS_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ vars.RAILWAY_DOCS_ENVIRONMENT_ID }}
        run: |
          : "${RAILWAY_TOKEN:?RAILWAY_TOKEN secret is not set}"
          : "${SERVICE_ID:?RAILWAY_DOCS_SERVICE_ID variable is not set}"
          : "${ENVIRONMENT_ID:?RAILWAY_DOCS_ENVIRONMENT_ID variable is not set}"

      - name: Trigger Railway rebuild
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ vars.RAILWAY_DOCS_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ vars.RAILWAY_DOCS_ENVIRONMENT_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          query='mutation($serviceId:String!,$environmentId:String!,$commitSha:String!){serviceInstanceDeployV2(serviceId:$serviceId,environmentId:$environmentId,commitSha:$commitSha)}'
          payload=$(jq -nc \
            --arg q "$query" --arg s "$SERVICE_ID" --arg e "$ENVIRONMENT_ID" --arg c "$COMMIT_SHA" \
            '{query:$q,variables:{serviceId:$s,environmentId:$e,commitSha:$c}}')
          resp=$(curl -sS -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$payload")
          echo "$resp"
          if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::Railway deploy trigger failed"
            exit 1
          fi
