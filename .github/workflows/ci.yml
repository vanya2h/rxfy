name: CI

on:
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Install, Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Unit Tests
        run: pnpm run test

      - name: Lint
        run: pnpm run lint
