name: RC Release

on:
  push:
    branches:
      - staging

concurrency:
  group: release
  # Cancel any in-flight run when a new push arrives so stale runs never
  # publish based on superseded code (e.g. after a force-push cleanup).
  cancel-in-progress: true

jobs:
  rc-release:
    name: Publish RC Packages
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Verify required secrets
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          : "${NPM_TOKEN:?NPM_TOKEN secret is not set — add it to the 'staging' environment (Settings → Environments)}"

      # RC uses snapshot releases: no pre-release mode, no version commits, no
      # tags. So the default GITHUB_TOKEN checkout is enough — no PAT needed.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending changesets
        id: changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq "0" ]; then
            echo "No pending changesets — nothing to release."
          fi

      # Snapshot versioning uses the *normal* bump math (which honours
      # onlyUpdatePeerDependentsWhenOutOfRange), unlike pre-release mode, so a
      # minor changeset stays a minor: 3.0.0 -> 3.1.0-rc-<commit>. The bump is
      # applied to the working tree only — never committed. Changesets remain on
      # the branch and are consumed later by the production release on `main`.
      - name: Version packages (snapshot)
        if: steps.changesets.outputs.count != '0'
        run: npx changeset version --snapshot rc

      - name: Build
        if: steps.changesets.outputs.count != '0'
        run: pnpm run build

      - name: Install Playwright browsers
        if: steps.changesets.outputs.count != '0'
        run: pnpm --filter rxfy-e2e exec playwright install --with-deps chromium

      - name: Sync e2e
        if: steps.changesets.outputs.count != '0'
        run: pnpm run test:e2e
        env:
          CI: "true"

      - name: Publish RC snapshot
        if: steps.changesets.outputs.count != '0'
        run: pnpm changeset publish --tag rc --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
