name: RC Release

on:
  push:
    branches:
      - staging

concurrency:
  group: release
  # Cancel any in-flight run when a new push arrives so stale runs never
  # publish based on superseded code (e.g. after a force-push cleanup).
  cancel-in-progress: true

jobs:
  rc-release:
    name: Publish RC Packages
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Verify required secrets
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          : "${PAT_TOKEN:?PAT_TOKEN secret is not set — add it to the 'staging' environment (Settings → Environments)}"
          : "${NPM_TOKEN:?NPM_TOKEN secret is not set — add it to the 'staging' environment (Settings → Environments)}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending changesets
        id: changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq "0" ]; then
            echo "No pending changesets — nothing to release."
          fi

      - name: Enter pre-release mode
        if: steps.changesets.outputs.count != '0'
        run: |
          if ! grep -q '"mode": *"pre"' .changeset/pre.json 2>/dev/null; then
            npx changeset pre enter rc
            git add .changeset/pre.json
            git diff --cached --quiet || git commit -m "chore: enter pre-release mode [skip ci]"
          fi

      - name: Version packages
        if: steps.changesets.outputs.count != '0'
        run: npx changeset version

      - name: Push version bumps
        if: steps.changesets.outputs.count != '0'
        run: git push

      - name: Re-install dependencies
        if: steps.changesets.outputs.count != '0'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.changesets.outputs.count != '0'
        run: pnpm run build

      - name: Install Playwright browsers
        if: steps.changesets.outputs.count != '0'
        run: pnpm --filter rxfy-e2e exec playwright install --with-deps chromium

      - name: Sync e2e
        if: steps.changesets.outputs.count != '0'
        run: pnpm run test:e2e
        env:
          CI: "true"

      - name: Publish RC packages
        if: steps.changesets.outputs.count != '0'
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release tags
        if: steps.changesets.outputs.count != '0'
        run: git push --follow-tags

      - name: Sync version bumps to develop
        # Best-effort housekeeping: packages are already published, so a sync
        # hiccup must not fail the job. `changeset version` leaves pre.json
        # modified-but-uncommitted, so force the switch to discard that churn.
        if: steps.changesets.outputs.count != '0'
        continue-on-error: true
        run: |
          git fetch origin develop
          git checkout -f develop
          if ! git merge staging --no-edit -X theirs; then
            # `-X theirs` only resolves content conflicts. .changeset/pre.json
            # hits a modify/delete conflict every RC cycle: pre-release state
            # is staging-only, and develop keeps it deleted. Anything else
            # conflicting is unexpected — abort so a human can sort it out.
            git rm -f --ignore-unmatch .changeset/pre.json
            if git ls-files -u | grep -q .; then
              echo "::warning::staging -> develop sync has unresolved conflicts; merge manually."
              git merge --abort
              exit 1
            fi
            git commit --no-edit
          fi
          git push origin develop
